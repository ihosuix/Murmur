<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Murmur</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Inter", sans-serif;
      }
      .tab-active {
        color: #111;
        border-bottom: 2px solid #111;
      }
      .tab-inactive {
        color: #9ca3af;
        border-bottom: 2px solid transparent;
      }
      input:focus {
        outline: none;
        border-color: #111;
      }
    </style>
  </head>
  <body class="bg-white min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-sm">
      <!-- Logo -->
      <div class="mb-10 text-center">
        <h1 class="text-2xl font-semibold tracking-tight text-gray-900">
          murmur
        </h1>
        <p class="text-sm text-gray-400 mt-1">quiet conversations</p>
      </div>

      <!-- Error Message -->
      <div
        id="error-msg"
        class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-100 rounded-xl"
      >
        <p class="text-xs text-red-500" id="error-text"></p>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-gray-100 mb-8">
        <button
          id="tab-signin"
          onclick="switchTab('signin')"
          class="tab-active flex-1 pb-3 text-sm font-medium transition-all"
        >
          Sign in
        </button>
        <button
          id="tab-signup"
          onclick="switchTab('signup')"
          class="tab-inactive flex-1 pb-3 text-sm font-medium transition-all"
        >
          Create account
        </button>
      </div>

      <!-- Sign In Form -->
      <form id="form-signin" class="space-y-4" onsubmit="handleSignIn(event)">
        <div>
          <label class="block text-xs text-gray-500 mb-1.5">Email</label>
          <input
            id="signin-email"
            type="email"
            placeholder="you@example.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-300 transition-all"
            required
          />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1.5">Password</label>
          <input
            id="signin-password"
            type="password"
            placeholder="••••••••"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-300 transition-all"
            required
          />
        </div>
        <div class="pt-1">
          <button
            type="submit"
            id="signin-btn"
            class="w-full bg-gray-900 text-white text-sm font-medium rounded-xl py-3 hover:bg-gray-700 active:scale-95 transition-all"
          >
            Sign in
          </button>
        </div>
        <p class="text-center text-xs text-gray-400 pt-1">
          Forgot your password?
          <a href="#" class="text-gray-600 underline underline-offset-2"
            >Reset it</a
          >
        </p>
      </form>

      <!-- Sign Up Form -->
      <form
        id="form-signup"
        class="space-y-4 hidden"
        onsubmit="handleSignUp(event)"
      >
        <div>
          <label class="block text-xs text-gray-500 mb-1.5">Name</label>
          <input
            id="signup-name"
            type="text"
            placeholder="Your name"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-300 transition-all"
            required
          />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1.5">Email</label>
          <input
            id="signup-email"
            type="email"
            placeholder="you@example.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-300 transition-all"
            required
          />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1.5">Password</label>
          <input
            id="signup-password"
            type="password"
            placeholder="At least 8 characters"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-300 transition-all"
            required
            minlength="8"
          />
        </div>
        <div class="pt-1">
          <button
            type="submit"
            id="signup-btn"
            class="w-full bg-gray-900 text-white text-sm font-medium rounded-xl py-3 hover:bg-gray-700 active:scale-95 transition-all"
          >
            Create account
          </button>
        </div>
        <p class="text-center text-xs text-gray-400 pt-1">
          By signing up you agree to our
          <a href="#" class="text-gray-600 underline underline-offset-2"
            >terms</a
          >
        </p>
      </form>
    </div>

    <script type="module">
      import { signUp, signIn, onAuthChange } from "/src/auth.js";

      // اگه قبلاً لاگین بود، مستقیم بره chats
      onAuthChange((user) => {
        if (user) window.location.href = "/pages/chats.html";
      });

      function showError(msg) {
        document.getElementById("error-text").textContent = msg;
        document.getElementById("error-msg").classList.remove("hidden");
      }

      function hideError() {
        document.getElementById("error-msg").classList.add("hidden");
      }

      function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.textContent = loading
          ? "Please wait..."
          : btn.id === "signin-btn"
            ? "Sign in"
            : "Create account";
        btn.style.opacity = loading ? "0.6" : "1";
      }

      window.handleSignIn = async (e) => {
        e.preventDefault();
        hideError();
        const email = document.getElementById("signin-email").value;
        const password = document.getElementById("signin-password").value;
        setLoading("signin-btn", true);
        try {
          await signIn(email, password);
          window.location.href = "/pages/chats.html";
        } catch (err) {
          setLoading("signin-btn", false);
          if (err.code === "auth/invalid-credential")
            showError("Email or password is incorrect.");
          else if (err.code === "auth/too-many-requests")
            showError("Too many attempts. Try again later.");
          else showError("Something went wrong. Please try again.");
        }
      };

      window.handleSignUp = async (e) => {
        e.preventDefault();
        hideError();
        const name = document.getElementById("signup-name").value;
        const email = document.getElementById("signup-email").value;
        const password = document.getElementById("signup-password").value;
        setLoading("signup-btn", true);
        try {
          await signUp(name, email, password);
          window.location.href = "/pages/chats.html";
        } catch (err) {
          setLoading("signup-btn", false);
          if (err.code === "auth/email-already-in-use")
            showError("This email is already registered.");
          else if (err.code === "auth/weak-password")
            showError("Password must be at least 8 characters.");
          else showError("Something went wrong. Please try again.");
        }
      };

      window.switchTab = (tab) => {
        const signin = document.getElementById("form-signin");
        const signup = document.getElementById("form-signup");
        const tabSignin = document.getElementById("tab-signin");
        const tabSignup = document.getElementById("tab-signup");
        hideError();
        if (tab === "signin") {
          signin.classList.remove("hidden");
          signup.classList.add("hidden");
          tabSignin.className =
            "tab-active flex-1 pb-3 text-sm font-medium transition-all";
          tabSignup.className =
            "tab-inactive flex-1 pb-3 text-sm font-medium transition-all";
        } else {
          signup.classList.remove("hidden");
          signin.classList.add("hidden");
          tabSignup.className =
            "tab-active flex-1 pb-3 text-sm font-medium transition-all";
          tabSignin.className =
            "tab-inactive flex-1 pb-3 text-sm font-medium transition-all";
        }
      };
    </script>
  </body>
</html>
