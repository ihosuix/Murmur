<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Murmur — Chats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Inter", sans-serif;
      }
      .chat-item:active {
        background-color: #f9fafb;
      }
    </style>
    <script type="module" crossorigin src="/assets/chats-Df0QaIt9.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/auth-B1AjK29O.js">
    <link rel="stylesheet" crossorigin href="/assets/auth-DW89CVhM.css">
  </head>
  <body class="bg-white min-h-screen max-w-sm mx-auto flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between px-5 pt-14 pb-4">
      <h1 class="text-xl font-semibold text-gray-900">Messages</h1>
      <button
        onclick="goToProfile()"
        class="w-8 h-8 rounded-full bg-gray-900 flex items-center justify-center"
      >
        <span id="avatar-letter" class="text-white text-xs font-medium">?</span>
      </button>
    </div>

    <!-- Search -->
    <div class="px-5 mb-4">
      <div class="flex items-center gap-3 bg-gray-50 rounded-2xl px-4 py-3">
        <svg
          class="w-4 h-4 text-gray-400 shrink-0"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="Search"
          oninput="filterChats()"
          class="bg-transparent text-sm text-gray-700 placeholder-gray-400 w-full focus:outline-none"
        />
      </div>
    </div>

    <!-- Chat List -->
    <div id="chat-list" class="flex-1 overflow-y-auto divide-y divide-gray-50">
      <div class="flex items-center justify-center py-16">
        <p class="text-sm text-gray-400">Loading...</p>
      </div>
    </div>

    <!-- New Chat Button -->
    <div class="px-5 pb-8 pt-4">
      <button
        onclick="openNewChat()"
        class="w-full bg-gray-900 text-white text-sm font-medium rounded-2xl py-3.5 hover:bg-gray-700 active:scale-95 transition-all"
      >
        New conversation
      </button>
    </div>

    <!-- New Chat Modal -->
    <div
      id="new-chat-modal"
      class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm flex items-end justify-center z-50"
    >
      <div class="bg-white w-full max-w-sm rounded-t-3xl px-5 pt-6 pb-10">
        <div class="flex items-center justify-between mb-6">
          <h3 class="text-base font-semibold text-gray-900">
            New conversation
          </h3>
          <button
            onclick="closeNewChat()"
            class="text-sm text-gray-400 hover:text-gray-700"
          >
            Cancel
          </button>
        </div>
        <input
          id="email-input"
          type="email"
          placeholder="Enter email address"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-900 focus:outline-none focus:border-gray-900 transition-all"
        />
        <p id="search-error" class="hidden text-xs text-red-400 mt-2 px-1">
          User not found.
        </p>
        <button
          onclick="startChat()"
          class="mt-4 w-full bg-gray-900 text-white text-sm font-medium rounded-2xl py-3.5 hover:bg-gray-700 active:scale-95 transition-all"
        >
          Start conversation
        </button>
      </div>
    </div>

  </body>
</html>
